<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Arsh ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4da6,#7b68ee,#00c9ff);
background-size:400% 400%;
animation:bg 10s infinite alternate;
font-family:Arial,sans-serif;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
width:90%;
max-width:700px;
text-align:center;
color:white;
box-shadow:0 0 25px rgba(255,255,255,.4);
animation:zoom 2s infinite alternate;
z-index:10;
}

h1{
font-size:40px;
margin-bottom:15px;
}

p{
font-size:20px;
line-height:1.7;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.03);}
}

.balloon{
position:absolute;
bottom:-150px;
width:55px;
height:75px;
border-radius:50%;
animation:float linear infinite;
}

.balloon::after{
content:'';
position:absolute;
width:2px;
height:70px;
background:white;
left:50%;
top:75px;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-130vh);}
}

.confetti{
position:absolute;
width:10px;
height:10px;
animation:fall linear infinite;
}

@keyframes fall{
from{transform:translateY(-100vh) rotate(0deg);}
to{transform:translateY(120vh) rotate(720deg);}
}

.sparkle{
position:absolute;
color:white;
font-size:18px;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%,100%{opacity:0;}
50%{opacity:1;}
}
</style>
</head>

<body>

<div class="card">
<h1>🎉 Happy Birthday Arsh 🎉</h1>

<p>
Happy Birthday! 🎉<br><br>

May Allah bless you with good health,
endless happiness,
strong faith,
and success in this life and the Hereafter.

May He accept your duas,
forgive your sins,
and fill your heart with peace and barakah.

<b>Ameen 🤲</b>

<br><br>

Have a beautiful year ahead! 

<br><br>

— From Ashu 
</p>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const colors=["red","yellow","blue","green","orange","purple","pink","cyan"];

for(let i=0;i<30;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
b.style.background=colors[Math.floor(Math.random()*colors.length)];
b.style.animationDuration=(6+Math.random()*6)+"s";
b.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(b);
}

for(let i=0;i<180;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.top=Math.random()*-100+"vh";
c.style.background=colors[Math.floor(Math.random()*colors.length)];
c.style.animationDuration=(3+Math.random()*5)+"s";
c.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(c);
}

for(let i=0;i<40;i++){
let s=document.createElement("div");
s.className="sparkle";
s.innerHTML="✨";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDelay=Math.random()*3+"s";
document.body.appendChild(s);
}

</script>

</body>
</html>
